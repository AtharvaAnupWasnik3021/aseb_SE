<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />  
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StructureAgent — Protein Druggability Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://3dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
<style>
  :root {
    --bg: #060810;
    --surface: #0d1120;
    --surface2: #131929;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --accent: #4fd1c5;
    --accent2: #63b3ed;
    --accent3: #f6ad55;
    --warn: #fc8181;
    --text: #e2e8f0;
    --muted: #718096;
    --dim: #4a5568;
    --glow: rgba(79,209,197,0.15);
    --glow2: rgba(99,179,237,0.1);
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* ── NAV ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(6,8,16,0.7);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.02em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .nav-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 100px 48px 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '';
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }
  .hero-eyebrow::after { background: linear-gradient(270deg, transparent, var(--accent)); }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(44px, 6vw, 76px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 28px;
  }

  .hero-title .line1 { color: var(--text); display: block; }
  .hero-title .line2 {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
  }

  .hero-sub {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 560px;
    margin: 0 auto 56px;
    font-weight: 300;
  }

  /* ── INPUT PANEL ── */
  .input-panel {
    max-width: 680px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 0 80px rgba(79,209,197,0.04), 0 32px 64px rgba(0,0,0,0.4);
    transition: box-shadow 0.3s ease;
  }

  .input-panel:focus-within {
    box-shadow: 0 0 80px rgba(79,209,197,0.08), 0 32px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,209,197,0.15);
  }

  .input-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .input-tab {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .input-tab.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .input-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .input-field {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 18px;
  }

  .input-field:focus {
    border-color: rgba(79,209,197,0.4);
    box-shadow: 0 0 0 3px rgba(79,209,197,0.08);
  }

  .input-field::placeholder { color: var(--dim); }

  .input-examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .example-chip {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    background: rgba(99,179,237,0.05);
    border: 1px solid rgba(99,179,237,0.15);
    border-radius: 20px;
    color: var(--accent2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .example-chip:hover {
    background: rgba(99,179,237,0.12);
    border-color: rgba(99,179,237,0.3);
  }

  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 18px;
  }

  .file-drop:hover, .file-drop.drag-over {
    border-color: rgba(79,209,197,0.4);
    background: rgba(79,209,197,0.03);
  }

  .file-drop-icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
    filter: grayscale(0.5);
  }

  .file-drop-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .file-drop-text strong { color: var(--accent); font-weight: 500; }

  .analyze-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: 12px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--bg);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .analyze-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
  }

  .analyze-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(79,209,197,0.3);
  }

  .analyze-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ── LOADING ── */
  .loading-screen {
    text-align: center;
    padding: 80px 48px;
    max-width: 500px;
    margin: 0 auto;
  }

  .loading-orb {
    width: 80px; height: 80px;
    margin: 0 auto 32px;
    position: relative;
  }

  .loading-orb-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--accent);
    border-right-color: rgba(79,209,197,0.3);
    animation: spin 1s linear infinite;
  }

  .loading-orb-inner::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-bottom-color: var(--accent2);
    animation: spin 0.7s linear infinite reverse;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .loading-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  .loading-steps { list-style: none; text-align: left; display: inline-block; }

  .loading-step {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--dim);
    padding: 5px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.3s;
  }

  .loading-step.done { color: var(--accent); }
  .loading-step.active { color: var(--text); }

  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* ── RESULTS ── */
  .results {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 48px 80px;
  }

  .results-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 20px;
  }

  .results-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .results-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .decision-badge {
    padding: 12px 24px;
    border-radius: 12px;
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
    border: 1px solid;
  }

  .decision-badge.good {
    background: rgba(72,187,120,0.1);
    border-color: rgba(72,187,120,0.3);
    color: #68d391;
    box-shadow: 0 0 24px rgba(72,187,120,0.1);
  }

  .decision-badge.moderate {
    background: rgba(246,173,85,0.1);
    border-color: rgba(246,173,85,0.3);
    color: #f6ad55;
    box-shadow: 0 0 24px rgba(246,173,85,0.1);
  }

  .decision-badge.poor {
    background: rgba(252,129,129,0.1);
    border-color: rgba(252,129,129,0.3);
    color: #fc8181;
    box-shadow: 0 0 24px rgba(252,129,129,0.1);
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 24px;
    align-items: start;
  }

  /* ── 3D VIEWER ── */
  .viewer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .viewer-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .viewer-toolbar-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .viewer-controls { display: flex; gap: 8px; }

  .viewer-btn {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .viewer-btn:hover, .viewer-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,209,197,0.05);
  }

  #mol-viewer {
    width: 100%;
    height: 520px;
    background: #060810;
    position: relative;
  }

  .viewer-legend {
    display: flex;
    gap: 20px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── METRICS SIDEBAR ── */
  .metrics-sidebar { display: flex; flex-direction: column; gap: 16px; }

  /* ── DRUG SCORE GAUGE ── */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .score-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .score-gauge-wrap {
    position: relative;
    width: 160px;
    height: 80px;
    margin: 0 auto 16px;
  }

  .score-gauge-wrap svg { overflow: visible; }

  .score-number {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .score-sublabel {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .score-bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .score-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--dim);
  }

  /* ── METRIC CARDS ── */
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .metric-card:hover { border-color: var(--border2); }

  .metric-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .metric-name {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .metric-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    background: rgba(99,179,237,0.08);
  }

  .metric-value {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .metric-unit {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
    font-weight: 400;
  }

  .metric-insight {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .metric-insight strong { color: var(--accent); font-weight: 500; }

  .metric-mini-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin: 10px 0;
  }

  .metric-mini-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── POCKET RESIDUES ── */
  .residues-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-top: 24px;
  }

  .residues-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .residues-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .residues-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .residue-chip {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid;
    transition: all 0.15s;
  }

  .residue-chip.hydro {
    background: rgba(252,129,129,0.08);
    border-color: rgba(252,129,129,0.2);
    color: #fc8181;
  }

  .residue-chip.polar {
    background: rgba(99,179,237,0.08);
    border-color: rgba(99,179,237,0.2);
    color: var(--accent2);
  }

  /* ── ACTIONS ROW ── */
  .actions-row {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 12px 20px;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .action-btn:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }

  .action-btn.primary {
    background: rgba(79,209,197,0.1);
    border-color: rgba(79,209,197,0.3);
    color: var(--accent);
  }

  .action-btn.primary:hover {
    background: rgba(79,209,197,0.18);
    box-shadow: 0 0 20px rgba(79,209,197,0.1);
  }

  /* ── ERROR ── */
  .error-banner {
    background: rgba(252,129,129,0.08);
    border: 1px solid rgba(252,129,129,0.25);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    color: #fc8181;
    margin-top: 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  /* ── HISTORY ── */
  .history-section {
    max-width: 680px;
    margin: 48px auto 0;
    padding: 0 48px 80px;
  }

  .history-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .history-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-item:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }

  .history-item-name {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
  }

  .history-item-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .history-item-score {
    font-size: 13px;
    font-weight: 600;
  }

  /* ── COMPARISON ── */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 24px;
  }

  .compare-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  /* ── CLUSTER SECTION ── */
  .cluster-section {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
  }

  .cluster-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .cluster-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .cluster-table th {
    text-align: left;
    color: var(--dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  .cluster-table td {
    padding: 10px 12px;
    color: var(--muted);
    border-bottom: 1px solid rgba(99,179,237,0.05);
  }

  .cluster-table tr.best td { color: var(--accent); }

  .fade-in {
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(12px); }
  }

  .stagger-1 { animation-delay: 0.05s; }
  .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.15s; }
  .stagger-4 { animation-delay: 0.2s; }
  .stagger-5 { animation-delay: 0.25s; }
  .stagger-6 { animation-delay: 0.3s; }

  @media (max-width: 1100px) {
    .results-grid { grid-template-columns: 1fr; }
    .metrics-sidebar { display: grid; grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 768px) {
    .nav { padding: 16px 20px; }
    .hero { padding: 60px 20px 40px; }
    .input-panel { padding: 20px; margin: 0 20px; }
    .results { padding: 24px 20px 60px; }
    .metrics-sidebar { grid-template-columns: 1fr; }
    .history-section { padding: 0 20px 60px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const HYDROPHOBIC_AA = new Set(["ALA","VAL","LEU","ILE","MET","PHE","TRP","PRO"]);

const EXAMPLES = ["1HVR", "4HHB", "1ATP", "3PTB", "1ACE"];

const STEPS = [
  "Resolving protein structure",
  "Fetching from RCSB / AlphaFold",
  "Parsing CA atoms",
  "Running Delaunay triangulation",
  "Clustering cavity points",
  "Computing pocket metrics",
  "Scoring druggability"
];

// ─── Simulated analysis (replace with real API call) ───
async function analyzeProtein(input, file) {
  const API_BASE = "http://localhost:8000";
  const fd = new FormData();
  if (file) fd.append("pdb_file", file);
  else fd.append("protein_input", input);

  const resp = await fetch(`${API_BASE}/analyze`, { method: "POST", body: fd });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: "Analysis failed" }));
    throw new Error(err.detail || "Analysis failed");
  }
  return resp.json();
}

// ─── Score gauge SVG ───
function ScoreGauge({ score }) {
  const r = 68, cx = 80, cy = 76;
  const clampedScore = Math.max(0, Math.min(1, score));
  const angle = clampedScore * Math.PI;
  const x = cx + r * Math.cos(Math.PI - angle);
  const y = cy - r * Math.sin(angle);
  const color = score > 0.6 ? "#68d391" : score > 0.4 ? "#f6ad55" : "#fc8181";
  return (
    <svg width="160" height="90" viewBox="0 0 160 90">
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`}
        fill="none" stroke="#1a2035" strokeWidth="12" strokeLinecap="round"/>
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${x} ${y}`}
        fill="none" stroke={color} strokeWidth="12" strokeLinecap="round"
        style={{ filter: `drop-shadow(0 0 6px ${color})` }}/>
      <circle cx={x} cy={y} r={6} fill={color}/>
    </svg>
  );
}

// ─── Metric card ───
function MetricCard({ icon, name, value, unit, insight, barValue, color, delay }) {
  return (
    <div className={`metric-card fade-in stagger-${delay}`}>
      <div className="metric-card-header">
        <span className="metric-name">{name}</span>
        <span className="metric-icon">{icon}</span>
      </div>
      <div className="metric-value" style={{ color }}>
        {value}<span className="metric-unit">{unit}</span>
      </div>
      {barValue !== undefined && (
        <div className="metric-mini-bar">
          <div className="metric-mini-fill" style={{ width: `${barValue * 100}%`, background: `linear-gradient(90deg, ${color}66, ${color})` }} />
        </div>
      )}
      {insight && <div className="metric-insight" dangerouslySetInnerHTML={{ __html: insight }} />}
    </div>
  );
}

// ─── 3D Viewer ───
function MolViewer({ pdbData, pocketResidues }) {
  const viewerRef = useRef(null);
  const glviewerRef = useRef(null);
  const [style, setStyle] = useState("cartoon");

  useEffect(() => {
    if (!pdbData || !viewerRef.current) return;
    if (glviewerRef.current) {
      glviewerRef.current.clear();
    }
    const viewer = $3Dmol.createViewer(viewerRef.current, {
      backgroundColor: "#060810",
      antialias: true,
    });
    glviewerRef.current = viewer;
    viewer.addModel(pdbData, "pdb");
    viewer.setStyle({}, { cartoon: { color: "spectrum" } });
    if (pocketResidues && pocketResidues.length > 0) {
      viewer.setStyle(
        { resi: pocketResidues },
        { stick: { colorscheme: "redCarbon", radius: 0.25 } }
      );
    }
    viewer.addSurface($3Dmol.SurfaceType.VDW, {
      opacity: 0.12,
      colorscheme: { gradient: "rwb", min: -1, max: 1 },
    });
    viewer.zoomTo();
    viewer.spin(true);
    viewer.render();
  }, [pdbData, pocketResidues]);

  const setViewStyle = (s) => {
    setStyle(s);
    if (!glviewerRef.current) return;
    const v = glviewerRef.current;
    v.setStyle({}, s === "cartoon"
      ? { cartoon: { color: "spectrum" } }
      : s === "surface"
      ? { sphere: { colorscheme: "amino", radius: 0.4 } }
      : { stick: { colorscheme: "amino" } }
    );
    if (pocketResidues && pocketResidues.length > 0) {
      v.setStyle({ resi: pocketResidues }, { stick: { colorscheme: "redCarbon", radius: 0.3 } });
    }
    v.render();
  };

  const toggleSpin = () => {
    if (!glviewerRef.current) return;
    glviewerRef.current.spin(!glviewerRef.current.isAnimated());
  };

  return (
    <div className="viewer-card fade-in">
      <div className="viewer-toolbar">
        <span className="viewer-toolbar-title">3D Structure Viewer</span>
        <div className="viewer-controls">
          {["cartoon","sticks","surface"].map(s => (
            <button key={s} className={`viewer-btn ${style===s?"active":""}`} onClick={() => setViewStyle(s)}>{s}</button>
          ))}
          <button className="viewer-btn" onClick={toggleSpin}>⟳ spin</button>
        </div>
      </div>
      <div id="mol-viewer" ref={viewerRef} />
      <div className="viewer-legend">
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "linear-gradient(135deg,#4169e1,#ff4500)" }} />
          <span>Protein backbone</span>
        </div>
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "#e53e3e" }} />
          <span>Binding pocket residues</span>
        </div>
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "rgba(79,209,197,0.4)", border:"1px solid var(--accent)" }} />
          <span>VDW surface</span>
        </div>
      </div>
    </div>
  );
}

// ─── Results Panel ───
function ResultsPanel({ data, proteinName, onReset, onSave }) {
  const decisionClass = data.decision.includes("Likely") ? "good"
    : data.decision.includes("Moderate") ? "moderate" : "poor";
  const scoreColor = data.drug_score > 0.6 ? "#68d391" : data.drug_score > 0.4 ? "#f6ad55" : "#fc8181";

  const getHydroInsight = (h) => {
    if (h > 0.7) return `<strong>Very high hydrophobicity (${h})</strong> — strong ligand affinity predicted. Ideal for hydrophobic small-molecule binding.`;
    if (h > 0.45) return `<strong>Moderate hydrophobicity (${h})</strong> — favorable conditions for lipophilic drug candidates.`;
    return `<strong>Low hydrophobicity (${h})</strong> — may require polar pharmacophores or charged compounds.`;
  };

  const getDepthInsight = (d) => {
    if (d > 12) return `<strong>Deep cavity (${d}Å)</strong> — excellent binding stability. Deep pockets resist solvation and ligand displacement.`;
    if (d > 7) return `<strong>Moderate depth (${d}Å)</strong> — reasonable binding potential. Consider extended ligand scaffolds.`;
    return `<strong>Shallow pocket (${d}Å)</strong> — limited binding depth. May require fragment-based strategies.`;
  };

  const getVolumeInsight = (v) => {
    if (v > 300) return `<strong>Large volume (${v} pts)</strong> — suitable for drug-sized molecules (~300–500 Da).`;
    if (v > 100) return `<strong>Moderate volume (${v} pts)</strong> — compatible with fragment-sized leads.`;
    return `<strong>Small pocket (${v} pts)</strong> — constrained volume; prioritize high-efficiency fragments.`;
  };

  return (
    <div className="results">
      <div className="results-header fade-in">
        <div>
          <div className="results-title">{proteinName || "Protein Analysis"}</div>
          <div className="results-meta">
            {data.num_residues} residues · {data.num_models} model{data.num_models !== 1 ? "s" : ""} · {data.pocket_residues.length} pocket residues
          </div>
        </div>
        <div style={{ display:"flex", gap:"12px", alignItems:"center" }}>
          <div className={`decision-badge ${decisionClass}`}>{data.decision}</div>
          <button className="action-btn" onClick={onReset}>← New Analysis</button>
        </div>
      </div>

      <div className="results-grid">
        {/* Left: Viewer */}
        <div>
          <MolViewer pdbData={data.pdb_data} pocketResidues={data.pocket_residues} />

          {/* Cluster research mode */}
          {data.all_clusters && data.all_clusters.length > 0 && (
            <div className="cluster-section fade-in stagger-4">
              <div className="cluster-title">Cavity Cluster Analysis — Research Mode</div>
              <table className="cluster-table">
                <thead>
                  <tr>
                    <th>Cluster</th>
                    <th>Size (pts)</th>
                    <th>Center X</th>
                    <th>Center Y</th>
                    <th>Center Z</th>
                  </tr>
                </thead>
                <tbody>
                  {data.all_clusters
                    .sort((a,b) => b.size - a.size)
                    .map((c, i) => (
                    <tr key={c.label} className={i===0 ? "best" : ""}>
                      <td>{i===0 ? "★ Primary" : `Cluster ${c.label}`}</td>
                      <td>{c.size}</td>
                      <td>{c.center[0].toFixed(1)}</td>
                      <td>{c.center[1].toFixed(1)}</td>
                      <td>{c.center[2].toFixed(1)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Pocket residues */}
          <div className="residues-card fade-in stagger-5">
            <div className="residues-title">Pocket Residues</div>
            <div className="residues-list">
              {data.pocket_residues.map(id => (
                <span key={id} className={`residue-chip ${HYDROPHOBIC_AA.has(id) ? "hydro" : "polar"}`}>
                  {id}
                </span>
              ))}
            </div>
            <div style={{ marginTop:"12px", fontSize:"11px", color:"var(--dim)", fontFamily:"var(--font-mono)" }}>
              <span style={{ color:"#fc8181" }}>■</span> Hydrophobic &nbsp;
              <span style={{ color:"var(--accent2)" }}>■</span> Polar/Charged
            </div>
          </div>

          <div className="actions-row fade-in stagger-6">
            <button className="action-btn primary" onClick={onSave}>
              ⬇ Export JSON
            </button>
            <button className="action-btn" onClick={() => {
              const text = `StructureAgent Report\n${proteinName}\n\nDrug Score: ${data.drug_score}\nDecision: ${data.decision}\nVolume: ${data.volume}\nDepth: ${data.depth}Å\nHydrophobic Ratio: ${data.hydrophobic_ratio}\nCompactness: ${data.compactness}\nPocket Residues: ${data.pocket_residues.join(", ")}`;
              navigator.clipboard.writeText(text);
            }}>
              📋 Copy Summary
            </button>
          </div>
        </div>

        {/* Right: Metrics */}
        <div className="metrics-sidebar">
          <div className="score-card fade-in stagger-1">
            <div className="score-label">Drug Score</div>
            <ScoreGauge score={data.drug_score} />
            <div className="score-number" style={{ color: scoreColor }}>{data.drug_score}</div>
            <div className="score-sublabel">out of 1.00</div>
            <div className="score-bar-track">
              <div className="score-bar-fill" style={{
                width: `${data.drug_score * 100}%`,
                background: `linear-gradient(90deg, ${scoreColor}88, ${scoreColor})`
              }} />
            </div>
            <div className="score-ticks">
              <span>Poor</span><span>Moderate</span><span>Druggable</span>
            </div>
          </div>

          <MetricCard delay={2} icon="⬡" name="Pocket Volume"
            value={data.volume} unit=" pts"
            barValue={Math.min(data.volume / 500, 1)}
            color="var(--accent2)"
            insight={getVolumeInsight(data.volume)} />

          <MetricCard delay={3} icon="↕" name="Pocket Depth"
            value={data.depth} unit=" Å"
            barValue={Math.min(data.depth / 20, 1)}
            color="var(--accent)"
            insight={getDepthInsight(data.depth)} />

          <MetricCard delay={4} icon="◎" name="Hydrophobic Ratio"
            value={data.hydrophobic_ratio} unit=""
            barValue={data.hydrophobic_ratio}
            color="#f6ad55"
            insight={getHydroInsight(data.hydrophobic_ratio)} />

          <MetricCard delay={5} icon="⬟" name="Compactness"
            value={data.compactness} unit=" σ"
            color="var(--muted)"
            insight={`<strong>Spatial spread ${data.compactness}σ</strong> — ${data.compactness < 4 ? "tight, well-defined pocket geometry" : "diffuse cavity; may benefit from conformational sampling"}.`} />
        </div>
      </div>
    </div>
  );
}

// ─── Loading Screen ───
function LoadingScreen({ step }) {
  return (
    <div className="loading-screen">
      <div className="loading-orb">
        <div className="loading-orb-inner" />
      </div>
      <div className="loading-title">Analyzing Structure</div>
      <div className="loading-sub">Running computational pipeline…</div>
      <ul className="loading-steps">
        {STEPS.map((s, i) => (
          <li key={i} className={`loading-step ${i < step ? "done" : i === step ? "active" : ""}`}>
            <span className="step-dot" />
            {i < step ? "✓ " : ""}{s}
          </li>
        ))}
      </ul>
    </div>
  );
}

// ─── Input Panel ───
function InputPanel({ onAnalyze }) {
  const [tab, setTab] = useState("text");
  const [input, setInput] = useState("");
  const [file, setFile] = useState(null);
  const [drag, setDrag] = useState(false);
  const [error, setError] = useState("");
  const fileRef = useRef(null);

  const submit = () => {
    if (tab === "text" && !input.trim()) { setError("Enter a protein name or PDB ID"); return; }
    if (tab === "file" && !file) { setError("Please upload a .pdb file"); return; }
    setError("");
    onAnalyze(tab === "text" ? input.trim() : null, tab === "file" ? file : null);
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDrag(false);
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith(".pdb")) { setFile(f); setError(""); }
    else setError("Please upload a valid .pdb file");
  };

  return (
    <div>
      <div className="input-panel">
        <div className="input-tabs">
          {[["text","🔬 Name / PDB ID"],["file","📁 Upload PDB"]].map(([t, label]) => (
            <button key={t} className={`input-tab ${tab===t?"active":""}`} onClick={() => { setTab(t); setError(""); }}>
              {label}
            </button>
          ))}
        </div>

        {tab === "text" && (
          <>
            <label className="input-label">Protein name or PDB identifier</label>
            <input
              className="input-field"
              placeholder="e.g.  1HVR  or  HIV protease  or  lysozyme"
              value={input}
              onChange={e => { setInput(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && submit()}
              autoFocus
            />
            <div className="input-examples">
              {EXAMPLES.map(ex => (
                <button key={ex} className="example-chip" onClick={() => setInput(ex)}>{ex}</button>
              ))}
            </div>
          </>
        )}

        {tab === "file" && (
          <>
            <div
              className={`file-drop ${drag ? "drag-over" : ""}`}
              onDragOver={e => { e.preventDefault(); setDrag(true); }}
              onDragLeave={() => setDrag(false)}
              onDrop={handleDrop}
              onClick={() => fileRef.current?.click()}
            >
              <span className="file-drop-icon">🧬</span>
              {file
                ? <div className="file-drop-text"><strong>{file.name}</strong><br/>{(file.size/1024).toFixed(1)} KB — ready to analyze</div>
                : <div className="file-drop-text">Drop <strong>.pdb file</strong> here<br/>or click to browse</div>
              }
            </div>
            <input ref={fileRef} type="file" accept=".pdb" style={{ display:"none" }}
              onChange={e => { const f = e.target.files[0]; if (f) setFile(f); }} />
          </>
        )}

        {error && (
          <div className="error-banner">
            <span>⚠</span> {error}
          </div>
        )}

        <button className="analyze-btn" onClick={submit}>
          Analyze Druggability →
        </button>
      </div>
    </div>
  );
}

// ─── History ───
function History({ items, onSelect }) {
  if (!items.length) return null;
  return (
    <div className="history-section">
      <div className="history-title">Recent Analyses</div>
      <div className="history-list">
        {items.slice(-5).reverse().map((item, i) => {
          const scoreColor = item.drug_score > 0.6 ? "#68d391" : item.drug_score > 0.4 ? "#f6ad55" : "#fc8181";
          return (
            <div key={i} className="history-item" onClick={() => onSelect(item)}>
              <div>
                <div className="history-item-name">{item.proteinName}</div>
                <div className="history-item-meta">{item.pocket_residues?.length} pocket residues</div>
              </div>
              <div className="history-item-meta">
                <div className="history-item-score" style={{ color: scoreColor }}>{item.drug_score}</div>
                <div>{item.decision?.split(" ")[0]}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [view, setView] = useState("home");
  const [results, setResults] = useState(null);
  const [loadingStep, setLoadingStep] = useState(0);
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem("sa_history") || "[]"); } catch { return []; }
  });
  const proteinNameRef = useRef("");

  const simulate = useCallback(async (fn) => {
    for (let i = 0; i < STEPS.length; i++) {
      setLoadingStep(i);
      await new Promise(r => setTimeout(r, 280 + Math.random() * 200));
    }
    return fn();
  }, []);

  const handleAnalyze = async (inputText, file) => {
    proteinNameRef.current = file ? file.name.replace(".pdb", "") : inputText;
    setView("loading");
    setLoadingStep(0);

    try {
      const data = await simulate(() => analyzeProtein(inputText, file));
      const entry = { ...data, proteinName: proteinNameRef.current };
      const newHistory = [...history, entry];
      setHistory(newHistory);
      try { localStorage.setItem("sa_history", JSON.stringify(newHistory.slice(-20))); } catch {}
      setResults(entry);
      setView("results");
    } catch (err) {
      alert("Analysis failed: " + err.message + "\n\nMake sure the backend is running at http://localhost:8000");
      setView("home");
    }
  };

  const handleExport = () => {
    if (!results) return;
    const blob = new Blob([JSON.stringify(results, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${proteinNameRef.current || "analysis"}_structureagent.json`;
    a.click();
  };

  return (
    <>
      <nav className="nav">
        <div className="nav-logo">
          <span className="nav-logo-dot" />
          StructureAgent
        </div>
        <span className="nav-badge">DRUGGABILITY ANALYSIS v1.0</span>
      </nav>

      {view === "home" && (
        <>
          <div className="hero">
            <div className="hero-eyebrow">Computational Structural Biology</div>
            <h1 className="hero-title">
              <span className="line1">AI-Powered Protein</span>
              <span className="line2">Druggability Analysis</span>
            </h1>
            <p className="hero-sub">
              Enter any protein name or PDB ID to detect binding pockets, compute druggability scores,
              and visualize structural features — powered by Delaunay triangulation and DBSCAN clustering.
            </p>
            <InputPanel onAnalyze={handleAnalyze} />
          </div>
          <History items={history} onSelect={(item) => { setResults(item); setView("results"); }} />
        </>
      )}

      {view === "loading" && <LoadingScreen step={loadingStep} />}

      {view === "results" && results && (
        <ResultsPanel
          data={results}
          proteinName={results.proteinName}
          onReset={() => setView("home")}
          onSave={handleExport}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
